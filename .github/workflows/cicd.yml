# Same FTP account as iapp. Successful iapp run used server-dir: /home/iappamfk/public_html/ (see iapp _run_*.log).
# Subdomain document root: /home/iappamfk/opticssymposia.iapp.am/
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  # Override with repo secret FTP_TARGET_DIR if your cPanel Linux user is different.
  DEFAULT_FTP_DIR: /home/iappamfk/opticssymposia.iapp.am/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Resolve server-dir
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          CP_USER="iappamfk"
          if [ -n "$T" ]; then
            D="$T"
            if ! echo "$D" | grep -qE '^/home/'; then
              D="/home/${CP_USER}/$(echo "$D" | sed 's:^/*::')"
            fi
          else
            D="${{ env.DEFAULT_FTP_DIR }}"
          fi
          case "$D" in
            */) ;;
            *) D="${D}/" ;;
          esac
          echo "server-dir: $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify live (no stale N2G in HTML)
        if: success()
        run: |
          set -e
          URL="https://opticssymposia.iapp.am/invited-speakers.html"
          for i in 1 2 3 4 5 6; do
            B=$(curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$URL")
            if echo "$B" | grep -qEi 'N2G Brains|footer-credit'; then
              echo "try $i/6: live still has N2G (wrong path or not synced yet)"
              if [ "$i" -eq 6 ]; then
                echo "::error::Set GitHub secret FTP_TARGET_DIR to the full cPanel path for opticssymposia (e.g. /home/<cpanel_user>/opticssymposia.iapp.am/) — same style as /home/iappamfk/public_html/ on the main iapp deploy."
                exit 1
              fi
              sleep 25
            else
              echo "OK: live source has no N2G"
              exit 0
            fi
          done
