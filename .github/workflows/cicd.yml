# OPTICS-15 static site → cPanel. Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# See README — server-dir = document root for https://opticssymposia.iapp.am/

name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  # Same folder as /home/USER/opticssymposia.iapp.am/ (change here if cPanel path differs)
  FTP_DEPLOY_DIR: opticssymposia.iapp.am/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Require FTP secrets
        env:
          S: ${{ secrets.FTP_SERVER }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$S" ] || [ -z "$U" ] || [ -z "$P" ]; then
            echo "::error::Set repository secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD"
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ env.FTP_DEPLOY_DIR }}
          security: strict
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/.cursor/**
            **/.DS_Store
            **/Thumbs.db
            .gitignore
            README.md
            scripts/**
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip
