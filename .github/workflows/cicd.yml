# Push to main → GitHub Actions → FTP deploy to cPanel. Live = repo when secrets are correct.
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_TARGET_DIR
# FTP_TARGET_DIR must be the cPanel *document root* for https://opticssymposia.iapp.am/ (e.g. opticssymposia.iapp.am/ with trailing slash)

name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI — verify static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          set -e
          for f in \
            index.html program.html registration.html \
            history.html gallery.html invited-speakers.html; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          echo "All required site files present."

  deploy:
    name: CD — FTP to hosting
    needs: [ ci ]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require all FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ] || [ -z "$FTP_TARGET_DIR" ]; then
            echo "::error::Set all of: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_TARGET_DIR (Settings → Secrets → Actions)"
            exit 1
          fi

      - name: Sync to hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          security: strict
          log-level: verbose
          exclude: |
            **/.github/**
            **/.git*
            .gitignore
            README.md
            scripts/**

      - name: Wait then verify live matches repo (no N2G in HTML)
        continue-on-error: true
        run: |
          set -e
          URL="https://opticssymposia.iapp.am/registration.html"
          for i in 1 2 3 4 5 6; do
            if [ "$i" != 1 ]; then sleep 20; fi
            echo "Check attempt $i: $URL"
            curl -fsS --max-time 45 "$URL" -o /tmp/registration.html
            if ! grep -qE 'N2G|Brains LLC' /tmp/registration.html; then
              echo "OK: live has no N2G line in served HTML (deploy path is correct)."
              exit 0
            fi
            echo "Still seeing N2G in live HTML (wrong FTP path or cache)."
          done
          echo "::warning::LIVE still contains N2G while repo does not. Set GitHub secret FTP_TARGET_DIR to cPanel document root for opticssymposia.iapp.am (e.g. opticssymposia.iapp.am/ ). Or delete the line in File Manager in all .html for this site."
          exit 1
