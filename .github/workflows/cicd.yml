name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  DEFAULT_DIR: opticssymposia.iapp.am/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Check FTP secrets
        env:
          A: ${{ secrets.FTP_SERVER }}
          B: ${{ secrets.FTP_USERNAME }}
          C: ${{ secrets.FTP_PASSWORD }}
        run: test -n "$A" && test -n "$B" && test -n "$C"

      - name: Remote folder
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          if [ -n "$T" ]; then D="$T"; else D="${{ env.DEFAULT_DIR }}"; fi
          if echo "$D" | grep -q '^/home/'; then D=$(echo "$D" | sed 's#^/home/[^/]*/##'); fi
          case "$D" in
            */) ;; *) D="${D}/" ;;
          esac
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          state-name: iappconfschool-sync
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip
