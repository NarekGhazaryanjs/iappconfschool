# Push main → FTP → https://opticssymposia.iapp.am/
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Optional: repo → Settings → Variables → CPANEL_FTP_DIR = path from FTP home (end with /)

name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  DEFAULT_FTP_DIR: opticssymposia.iapp.am/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Require FTP secrets
        env:
          S: ${{ secrets.FTP_SERVER }}
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$S" ] || [ -z "$U" ] || [ -z "$P" ]; then
            echo "::error::Repository secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD"
            exit 1
          fi

      - name: Resolve deploy path
        id: path
        env:
          SECT: ${{ secrets.FTP_TARGET_DIR }}
          VAR: ${{ vars.CPANEL_FTP_DIR }}
        run: |
          # Priority: secret FTP_TARGET_DIR (relative path, e.g. opticssymposia.iapp.am/) → var CPANEL_FTP_DIR → default
          T=""
          if [ -n "$SECT" ]; then
            T="$SECT"
            echo "Using secret FTP_TARGET_DIR (do not use /home/... full path; use path from FTP chroot, e.g. opticssymposia.iapp.am/)"
          elif [ -n "$VAR" ]; then
            T="$VAR"
            echo "Using variable CPANEL_FTP_DIR"
          else
            T="${{ env.DEFAULT_FTP_DIR }}"
            echo "Using default"
          fi
          case "$T" in
            */) ;; *) T="${T}/" ;;
          esac
          echo "dir=$T" >> "$GITHUB_OUTPUT"
          echo "Deploy server-dir: $T"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.path.outputs.dir }}
          # strict often breaks cPanel shared FTP; loose = plain (typical for port 21)
          security: loose
          # New state file = full re-sync (fixes "nothing changes" when delta is stuck)
          state-name: iappconfschool-sync
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/.cursor/**
            **/.DS_Store
            **/Thumbs.db
            .gitignore
            README.md
            scripts/**
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip
