# Deploy: cPanel root for opticssymposia.iapp.am is /home/USER/opticssymposia.iapp.am (not under public_html). Default server-dir: opticssymposia.iapp.am/ — override with secret FTP_TARGET_DIR or workflow_dispatch.
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ftp_path_override:
        description: "Override FTP path (relative to FTP login), e.g. opticssymposia.iapp.am/ or ./"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess
          test -f scripts/ftp-read-remote.py

      - name: Require FTP secrets
        env:
          A: ${{ secrets.FTP_SERVER }}
          B: ${{ secrets.FTP_USERNAME }}
          C: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$A" ] || [ -z "$B" ] || [ -z "$C" ]; then
            echo "::error::Set FTP_SERVER, FTP_USERNAME, FTP_PASSWORD for this repository."
            exit 1
          fi

      - name: Determine FTP server-dir
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          OVR='${{ github.event.inputs.ftp_path_override }}'
          rel() {
            local x="$1"
            if echo "$x" | grep -qE '^/home/'; then
              echo "$x" | sed -E "s#^/home/[^/]+/##"
            else
              echo "$x" | sed 's:^/*::'
            fi
          }
          fix_slash() {
            case "$1" in
              */) echo "$1" ;;
              *) echo "$1/" ;;
            esac
          }
          if [ -n "$OVR" ]; then
            D=$(fix_slash "$(rel "$OVR")")
            echo "Using workflow input: $D"
            echo "dir=$D" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$T" ]; then
            D=$(fix_slash "$(rel "$T")")
            echo "Using FTP_TARGET_DIR: $D"
            echo "dir=$D" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Matches panel: “Корневая папка” /home/iappamfk/opticssymposia.iapp.am
          D="opticssymposia.iapp.am/"
          echo "Default (cPanel document root for this subdomain, not public_html/): $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          state-name: iappconfschool-sync-v3
          log-level: standard
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify index on FTP (authoritative)
        if: success()
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SERVER_DIR: ${{ steps.p.outputs.dir }}
        run: python3 scripts/ftp-read-remote.py

      # Must match what visitors get; otherwise FTP path ≠ subdomain document root.
      - name: Check public site (non-blocking)
        if: success()
        continue-on-error: true
        run: |
          if curl -fsSL -H "Cache-Control: no-cache" "https://opticssymposia.iapp.am/?_=${GITHUB_RUN_ID}" | grep -q "iappconfschool-deploy"; then
            echo "OK: live page has deploy marker"
            exit 0
          fi
          echo "::warning::Live HTTPS page has no deploy marker — FTP path may not match the subdomain (compare with cPanel Document Root)."
          exit 0

      - name: Verify live HTML (N2G)
        if: success()
        run: |
          set -e
          n2g() { curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" 2>/dev/null | grep -Eqi 'N2G Brains|footer-credit'; }
          for i in 1 2 3 4 5 6; do
            if n2g "https://opticssymposia.iapp.am/invited-speakers.html" || n2g "https://opticssymposia.iapp.am/program.html"; then
              if [ "$i" -eq 6 ]; then echo "::error::N2G still in live HTML"; exit 1; fi
              sleep 20
            else
              echo "OK: no N2G in invited/program"
              exit 0
            fi
          done
