# Same pattern as Desktop/iapp/.github/workflows/deploy.yml (iapp: server-dir: /public_html/)
# This site is a subdomain: use /opticssymposia.iapp.am/ from the FTP account root.
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  # Must match cPanel: absolute path from FTP root, leading slash (like /public_html/ on iapp)
  DEFAULT_FTP_DIR: /opticssymposia.iapp.am/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Resolve server-dir
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          if [ -n "$T" ]; then D="$T"; else D="${{ env.DEFAULT_FTP_DIR }}"; fi
          # Pasted cPanel full path: /home/USER/opticssymposia.iapp.am -> opticssymposia.iapp.am
          if echo "$D" | grep -q '^/home/'; then
            D=$(echo "$D" | sed 's#^/home/[^/]*/##')
          fi
          # Like iapp: always absolute from FTP root (/public_html/ style)
          case "$D" in
            /*) ;;
            *) D="/$D" ;;
          esac
          case "$D" in
            */) ;;
            *) D="${D}/" ;;
          esac
          echo "server-dir: $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify live (no stale N2G in HTML)
        if: success()
        run: |
          set -e
          URL="https://opticssymposia.iapp.am/invited-speakers.html"
          for i in 1 2 3 4 5 6; do
            B=$(curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$URL")
            if echo "$B" | grep -qEi 'N2G Brains|footer-credit'; then
              echo "try $i/6: live still has N2G (wrong folder or still syncing)"
              if [ "$i" -eq 6 ]; then
                echo "::error::Live not updated. In Secrets set FTP_TARGET_DIR to /opticssymposia.iapp.am/ (or leave unset). Must match cPanel document root for the subdomain."
                exit 1
              fi
              sleep 25
            else
              echo "OK: live source has no N2G"
              exit 0
            fi
          done
