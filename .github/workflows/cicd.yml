# iapp main site uses /home/USER/public_html/. Subdomain docroot is often /home/USER/public_html/opticssymposia.iapp.am/ (default below).
# Set repo Variable USE_HOME_SUBDOMAIN=true for /home/USER/opticssymposia.iapp.am/ only. CPANEL_LINUX_USER if not iappamfk.
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Require FTP secrets (copy from iapp repo if missing)
        env:
          A: ${{ secrets.FTP_SERVER }}
          B: ${{ secrets.FTP_USERNAME }}
          C: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$A" ] || [ -z "$B" ] || [ -z "$C" ]; then
            echo "::error::Add FTP_SERVER, FTP_USERNAME, FTP_PASSWORD to this repository (Settings → Secrets). They are per-repo — same values as the iapp project."
            exit 1
          fi

      # cPanel: subdomain vhost is often *under* public_html, not a sibling of public_html.
      # Secret FTP_TARGET_DIR overrides. Repo Variable USE_HOME_SUBDOMAIN=true uses ~/opticssymposia.iapp.am/ instead.
      - name: Resolve server-dir
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          U='${{ vars.CPANEL_LINUX_USER }}'
          if [ -z "$U" ]; then U="iappamfk"; fi
          HOME_MODE='${{ vars.USE_HOME_SUBDOMAIN }}'
          if [ -n "$T" ]; then
            D="$T"
            if ! echo "$D" | grep -qE '^/home/'; then
              D="/home/${U}/$(echo "$D" | sed 's:^/*::')"
            fi
          else
            if [ "$HOME_MODE" = "true" ] || [ "$HOME_MODE" = "1" ] || [ "$HOME_MODE" = "yes" ]; then
              D="/home/${U}/opticssymposia.iapp.am/"
            else
              D="/home/${U}/public_html/opticssymposia.iapp.am/"
            fi
          fi
          case "$D" in
            */) ;;
            *) D="${D}/" ;;
          esac
          echo "server-dir: $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify live (no stale N2G in HTML)
        if: success()
        run: |
          set -e
          n2g() { curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" 2>/dev/null | grep -Eqi 'N2G Brains|footer-credit'; }
          for i in 1 2 3 4 5 6; do
            if n2g "https://opticssymposia.iapp.am/invited-speakers.html" || n2g "https://opticssymposia.iapp.am/program.html"; then
              echo "try $i/6: N2G still in invited or program (wrong FTP path?)"
              if [ "$i" -eq 6 ]; then
                echo "::error::Set repo Variable USE_HOME_SUBDOMAIN=true or secret FTP_TARGET_DIR=full path from cPanel Subdomains → Document Root. Default is public_html/opticssymposia.iapp.am/."
                exit 1
              fi
              sleep 25
            else
              echo "OK: live pages clean (no N2G in source)"
              exit 0
            fi
          done
