# CI + CD: https://github.com/NarekGhazaryanjs/iappconfschool
# CD target: iapp.am → separate subdomain (own doc root), e.g. optics.iapp.am
#   In cPanel → Domains: create subdomain, UNCHECK "share public_html with iapp.am"
#   Then set server-dir below to match "Корневая папка" (often public_html/sub/<name>/).
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_TARGET_DIR

name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI — verify static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          set -e
          for f in \
            index.html program.html registration.html \
            history.html gallery.html invited-speakers.html; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          echo "All required site files present."

  deploy:
    name: CD — FTP to opticssymposia (subdomain root)
    needs: [ ci ]
    # Run on push to main OR manual "Run workflow" (not on pull_request)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # cPanel path; set secret FTP_TARGET_DIR to e.g. opticssymposia/ (trailing / required)
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          security: strict
          log-level: verbose
          exclude: |
            **/.github/**
            **/.git*
            .gitignore
            README.md
