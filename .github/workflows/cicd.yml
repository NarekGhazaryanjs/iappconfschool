# FTP-Deploy-Action server-dir = path RELATIVE to FTP login dir (cPanel: usually /home/USER), NOT full /home/.../ — or files land in wrong place.
# Secret FTP_TARGET_DIR may be /home/USER/opticssymposia.iapp.am/ — we strip to opticssymposia.iapp.am/ automatically.
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ftp_path_override:
        description: "Paste cPanel Document Root for opticssymposia (e.g. /home/USER/...). Saves re-adding secret."
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Require FTP secrets (copy from iapp repo if missing)
        env:
          A: ${{ secrets.FTP_SERVER }}
          B: ${{ secrets.FTP_USERNAME }}
          C: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$A" ] || [ -z "$B" ] || [ -z "$C" ]; then
            echo "::error::Add FTP_SERVER, FTP_USERNAME, FTP_PASSWORD to this repository (Settings → Secrets). They are per-repo — same values as the iapp project."
            exit 1
          fi

      - name: Resolve server-dir (relative to FTP home for cPanel)
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          U='${{ vars.CPANEL_LINUX_USER }}'
          if [ -z "$U" ]; then U="iappamfk"; fi
          MODE='${{ vars.CPANEL_FTP_DIR_MODE }}'
          if [ -z "$MODE" ]; then MODE="home"; fi
          OVR='${{ github.event.inputs.ftp_path_override }}'
          # Strip /home/USER/ from absolute paths; FTP-Deploy is relative to login dir.
          rel() {
            local x="$1"
            if echo "$x" | grep -qE '^/home/'; then
              echo "$x" | sed -E "s#^/home/[^/]+/##"
            else
              echo "$x" | sed 's:^/*::'
            fi
          }
          if [ -n "$OVR" ]; then
            D=$(rel "$OVR")
          elif [ -n "$T" ]; then
            D=$(rel "$T")
          else
            case "$MODE" in
              home)
                D="opticssymposia.iapp.am/" ;;
              public_html)
                D="public_html/opticssymposia.iapp.am/" ;;
              domains|*)
                D="domains/opticssymposia.iapp.am/public_html/" ;;
            esac
          fi
          D=$(rel "$D")
          case "$D" in
            */) ;;
            *) D="${D}/" ;;
          esac
          echo "server-dir (FTP relative): $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          state-name: iappconfschool-sync-v2
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify live (no stale N2G in HTML)
        if: success()
        run: |
          set -e
          n2g() { curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" 2>/dev/null | grep -Eqi 'N2G Brains|footer-credit'; }
          for i in 1 2 3 4 5 6; do
            if n2g "https://opticssymposia.iapp.am/invited-speakers.html" || n2g "https://opticssymposia.iapp.am/program.html"; then
              echo "try $i/6: N2G still in invited or program (wrong FTP path?)"
              if [ "$i" -eq 6 ]; then
                echo "::error::Set secret FTP_TARGET_DIR to exact Document Root from cPanel (Subdomains). Or try repo Variable CPANEL_FTP_DIR_MODE=home or public_html (default is domains)."
                exit 1
              fi
              sleep 25
            else
              echo "OK: live pages clean (no N2G in source)"
              exit 0
            fi
          done
