# server-dir = path relative to WHERE YOUR FTP USER STARTS.
# - Best: cPanel → FTP Accounts → new user, Directory = this subdomain’s folder only → in GitHub set CPANEL_FTP_IS_SUBACCOUNT=true (server-dir ./).
# - Else: CPANEL_FTP_CHROOT: home (default) | public_html
name: Deploy iappconfschool to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ftp_path_override:
        description: "Paste cPanel Document Root for opticssymposia (e.g. /home/USER/...). Saves re-adding secret."
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          for f in index.html program.html registration.html history.html gallery.html invited-speakers.html; do
            test -f "$f"
          done
          test -f css/style.css
          test -f css/fonts.css
          test -f js/main.js
          test -f downloads/1st-announcement.pdf
          test -f .htaccess

      - name: Require FTP secrets (copy from iapp repo if missing)
        env:
          A: ${{ secrets.FTP_SERVER }}
          B: ${{ secrets.FTP_USERNAME }}
          C: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$A" ] || [ -z "$B" ] || [ -z "$C" ]; then
            echo "::error::Add FTP_SERVER, FTP_USERNAME, FTP_PASSWORD to this repository (Settings → Secrets). They are per-repo — same values as the iapp project."
            exit 1
          fi

      - name: Resolve server-dir (relative to FTP login)
        id: p
        env:
          T: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          set -e
          U='${{ vars.CPANEL_LINUX_USER }}'
          if [ -z "$U" ]; then U="iappamfk"; fi
          SUB='${{ vars.CPANEL_FTP_IS_SUBACCOUNT }}'
          CHROOT='${{ vars.CPANEL_FTP_CHROOT }}'
          if [ -z "$CHROOT" ]; then CHROOT="home"; fi
          MODE='${{ vars.CPANEL_FTP_DIR_MODE }}'
          if [ -z "$MODE" ]; then MODE="home"; fi
          OVR='${{ github.event.inputs.ftp_path_override }}'
          rel() {
            local x="$1"
            if echo "$x" | grep -qE '^/home/'; then
              echo "$x" | sed -E "s#^/home/[^/]+/##"
            else
              echo "$x" | sed 's:^/*::'
            fi
          }
          if [ "$SUB" = "true" ] || [ "$SUB" = "1" ] || [ "$SUB" = "yes" ]; then
            D="./"
          elif [ -n "$OVR" ]; then
            D=$(rel "$OVR")
          elif [ -n "$T" ]; then
            D=$(rel "$T")
          else
            case "$MODE" in
              home)
                D="opticssymposia.iapp.am/" ;;
              public_html)
                D="public_html/opticssymposia.iapp.am/" ;;
              domains|*)
                D="domains/opticssymposia.iapp.am/public_html/" ;;
            esac
            D=$(rel "$D")
          fi
          if [ "$SUB" != "true" ] && [ "$SUB" != "1" ] && [ "$SUB" != "yes" ]; then
            D=$(rel "$D")
            if [ "$CHROOT" = "public_html" ] && ! echo "$D" | grep -q '^\.\./'; then
              D="../$D"
            fi
          fi
          case "$D" in
            */) ;;
            *) D="${D}/" ;;
          esac
          echo "CPANEL_FTP_CHROOT=$CHROOT"
          echo "server-dir (FTP relative): $D"
          echo "dir=$D" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ steps.p.outputs.dir }}
          security: loose
          state-name: iappconfschool-sync-v2
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            .gitignore
            README.md
            scripts/**
            **/node_modules/**
            **/.cursor/**
            **/.vscode/**
            **/.DS_Store
            **/Thumbs.db
            iapp-deploy.zip
            shablon.txt
            opticssymposia-site.zip

      - name: Verify live (index marker + no N2G)
        if: success()
        run: |
          set -e
          n2g() { curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" 2>/dev/null | grep -Eqi 'N2G Brains|footer-credit'; }
          marker() { curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" 2>/dev/null | grep -Fq 'iappconfschool-deploy: active'; }
          for i in 1 2 3 4 5 6; do
            IDX="https://opticssymposia.iapp.am/index.html"
            if ! marker "$IDX"; then
              echo "try $i/6: index has no deploy marker (wrong FTP folder or cache)"
              if [ "$i" -eq 6 ]; then
                echo "::error::FTP is not writing the live document root. Create a cPanel FTP user whose home folder IS ONLY this subdomain, then set repo Variable CPANEL_FTP_IS_SUBACCOUNT=true. Or adjust CPANEL_FTP_CHROOT / FTP_TARGET_DIR."
                exit 1
              fi
              sleep 25
              continue
            fi
            if n2g "https://opticssymposia.iapp.am/invited-speakers.html" || n2g "https://opticssymposia.iapp.am/program.html"; then
              echo "try $i/6: N2G still in invited or program"
              if [ "$i" -eq 6 ]; then
                echo "::error::N2G check failed."
                exit 1
              fi
              sleep 25
            else
              echo "OK: index marker present, no N2G"
              exit 0
            fi
          done
