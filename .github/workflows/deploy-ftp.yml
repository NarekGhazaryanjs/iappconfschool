# Push to `main` → deploy to reg.am cPanel, domain root:
#   /home/iappamfk/opticssymposia.am
# (spelling: opticssymposia, not "synposia")
#
# GitHub: Settings → Secrets → Actions:
#   FTP_HOST       — usually server2.reg.am or the FTP host from reg.am (see hosting email)
#   FTP_USERNAME   — cPanel / FTP user (e.g. iappamfk)
#   FTP_PASSWORD
#
# If FTP after login is already *inside* opticssymposia.am, change server-dir to ./

name: Deploy site (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to opticssymposia.am
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: opticssymposia.am/
          security: strict
          log-level: verbose
          exclude: |
            **/.github/**
            **/.git*
            .gitignore
          # Note: v4 diff sync does not always remove old server-only folders
          # (e.g. legacy about/, contact/) — delete them once in File Manager if they remain.
